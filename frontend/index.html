<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AARAMBH - India's Sovereign Intelligence Terminal" />
    <title>AARAMBH Intelligence Terminal</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Suppress browser extension errors -->
    <script>
      // Suppress errors from browser extensions (backendManager.js, refresh.js, etc.)
      window.addEventListener('error', function(e) {
        if (e.filename && (
          e.filename.includes('backendManager.js') ||
          e.filename.includes('refresh.js') ||
          e.filename.includes('content-script.js') ||
          e.filename.includes('extension')
        )) {
          e.preventDefault();
          e.stopPropagation();
          return true;
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && (
          e.reason.message.includes('WebSocket') ||
          e.reason.message.includes('extension')
        )) {
          e.preventDefault();
          return true;
        }
      });
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
